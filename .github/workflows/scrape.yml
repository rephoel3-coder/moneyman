name: Scrape
on:
  workflow_dispatch:
  schedule:
    - cron: "5 10,22 * * *"
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Write config and run scraper
        run: |
          mkdir -p $HOME/moneyman
          echo "$MONEYMAN_CONFIG" | jq --arg key "$GOOGLE_PRIVATE_KEY" '.storage.googleSheets.serviceAccountPrivateKey = $key' > $HOME/moneyman/config.json
          echo "Config size: $(wc -c < $HOME/moneyman/config.json) bytes"
          docker run --rm \
            -v $HOME/moneyman/config.json:/config.json \
            -e MONEYMAN_CONFIG_PATH=/config.json \
            -e TZ="Asia/Jerusalem" \
            ghcr.io/daniel-hauser/moneyman:latest
        env:
          MONEYMAN_CONFIG: ${{ secrets.MONEYMAN_CONFIG }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          TZ: "Asia/Jerusalem"
