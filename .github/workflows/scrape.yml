name: Scrape
on:
  workflow_dispatch:
  schedule:
    - cron: "5 10,22 * * *"
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Run scraper
        run: >
          docker run --rm
          -e MONEYMAN_CONFIG
          -e TZ
          ghcr.io/daniel-hauser/moneyman:latest
        env:
          MONEYMAN_CONFIG: ${{ secrets.MONEYMAN_CONFIG }}
          TZ: "Asia/Jerusalem"
