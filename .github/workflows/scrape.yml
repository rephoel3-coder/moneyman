name: Scrape
on:
  workflow_dispatch:
  schedule:
    - cron: "5 10,22 * * *"
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Write config
        run: |
          CONFIG=$(echo "$MONEYMAN_CONFIG" | jq --arg key "$GOOGLE_PRIVATE_KEY" '.storage.googleSheets.serviceAccountPrivateKey = $key')
          echo "$CONFIG" > /tmp/config.json
          echo "Config size: $(wc -c < /tmp/config.json) bytes"
        env:
          MONEYMAN_CONFIG: ${{ secrets.MONEYMAN_CONFIG }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      - name: Run scraper
        run: |
          docker run --rm \
            -v /tmp/config.json:/tmp/config.json \
            -e MONEYMAN_CONFIG_PATH=/tmp/config.json \
            -e TZ="Asia/Jerusalem" \
            ghcr.io/daniel-hauser/moneyman:latest
