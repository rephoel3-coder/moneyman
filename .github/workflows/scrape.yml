name: Scrape
on:
  workflow_dispatch:
  schedule:
    - cron: "5 10,22 * * *"
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Run scraper
        run: |
          FULL_CONFIG=$(echo "$MONEYMAN_CONFIG" | jq --arg key "$GOOGLE_PRIVATE_KEY" '.storage.googleSheets.serviceAccountPrivateKey = $key' | jq -c .)
          docker run --rm \
            -e MONEYMAN_CONFIG="$FULL_CONFIG" \
            -e TZ="Asia/Jerusalem" \
            -e MONEYMAN_UNSAFE_STDOUT="true" \
            -e DEBUG="moneyman:*" \
            ghcr.io/daniel-hauser/moneyman:latest
        env:
          MONEYMAN_CONFIG: ${{ secrets.MONEYMAN_CONFIG }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          TZ: "Asia/Jerusalem"
