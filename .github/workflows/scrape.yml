name: Scrape
on:
  workflow_dispatch:
  schedule:
    - cron: "5 10,22 * * *"
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Run scraper
        run: |
          printf '%s' "$MONEYMAN_CONFIG" > /tmp/config.json
          docker run --rm \
            -v /tmp/config.json:/tmp/config.json \
            -e MONEYMAN_CONFIG_PATH=/tmp/config.json \
            -e TZ="Asia/Jerusalem" \
            ghcr.io/daniel-hauser/moneyman:latest
        env:
          MONEYMAN_CONFIG: ${{ secrets.MONEYMAN_CONFIG }}
          TZ: "Asia/Jerusalem"
